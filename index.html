<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Vigilance Météo Canada - Flux Complet</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
      :root {
        --sidebar-width: 350px;
        --primary: #1a1a1a;
      }
      body,
      html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "Segoe UI", sans-serif;
        background: #eee;
        overflow: hidden;
      }
      .container {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      header {
        height: 60px;
        background: var(--primary);
        color: white;
        display: flex;
        align-items: center;
        padding: 0 20px;
        z-index: 1001;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
      }
      header h2 {
        margin: 0;
        font-size: 1.2rem;
      }
      .main-content {
        display: flex;
        flex: 1;
        overflow: hidden;
      }
      #sidebar {
        width: var(--sidebar-width);
        background: white;
        border-right: 1px solid #ddd;
        display: flex;
        flex-direction: column;
        z-index: 1000;
      }
      #map {
        flex: 1;
        height: 100%;
        width: 100%;
        background: #aad3df;
      }
      .sidebar-section {
        padding: 15px;
        border-bottom: 1px solid #eee;
      }
      .alert-list-container {
        flex: 1;
        overflow-y: auto;
      }
      .alert-card {
        padding: 12px;
        border-bottom: 1px solid #f0f0f0;
        cursor: pointer;
        display: flex;
        align-items: center;
        border-left: 6px solid transparent;
        transition: background 0.2s;
      }
      .alert-card:hover {
        background: #f8f9fa;
      }
      .alert-card strong {
        display: block;
        margin-bottom: 4px;
        color: #333;
      }
      .alert-card small {
        color: #666;
        line-height: 1.4;
      }
      #loader {
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 2000;
        background: white;
        padding: 12px 24px;
        border-radius: 30px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        font-weight: bold;
        display: none;
      }
      .dot {
        height: 12px;
        width: 12px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 8px;
        vertical-align: middle;
      }
      .legend-item {
        margin-bottom: 5px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h2>🇨🇦 Vigilance Météo (SMC/ECCC)</h2>
      </header>
      <div class="main-content">
        <div id="sidebar">
          <div class="sidebar-section">
            <h3>Légende</h3>
            <div class="legend-item">
              <span class="dot" style="background: #e74c3c"></span>
              Avertissement
            </div>
            <div class="legend-item">
              <span class="dot" style="background: #e67e22"></span> Veille
            </div>
            <div class="legend-item">
              <span class="dot" style="background: #f1c40f"></span> Avis
            </div>
            <div class="legend-item">
              <span class="dot" style="background: #95a5a6"></span> Bulletin
              spécial
            </div>
          </div>
          <div
            class="sidebar-section"
            style="border-bottom: none; padding-bottom: 5px"
          >
            <h3 id="alert-status" style="margin: 0 0 10px 0; font-size: 1rem">
              Chargement...
            </h3>
          </div>
          <div id="alert-list" class="alert-list-container"></div>
        </div>
        <div id="map"></div>
      </div>
    </div>
    <div id="loader">Récupération des données SMC...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
      // 1. Initialize Map
      const map = L.map("map").setView([58, -95], 4);

      L.tileLayer(
        "https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png",
        {
          attribution: "© OpenStreetMap © CARTO",
          subdomains: "abcd",
          maxZoom: 19,
        }
      ).addTo(map);

      // Helper: Get Color based on priority/type
      function getColor(properties) {
        const type = properties.type || "";
        const priority = properties.priority || "";

        if (type.includes("Warning") || priority === "High") return "#e74c3c"; // Red
        if (type.includes("Watch")) return "#e67e22"; // Orange
        if (type.includes("Statement")) return "#f1c40f"; // Yellow

        return "#95a5a6"; // Grey/Default
      }

      async function loadData() {
        const loader = document.getElementById("loader");
        const listContainer = document.getElementById("alert-list");
        const statusLabel = document.getElementById("alert-status");

        loader.style.display = "block";
        loader.innerText = "Récupération des données SMC...";

        // Official ECCC GeoJSON Feed
        const originalUrl =
          "https://dd.weather.gc.ca/alerts/cap/geodata/EC_alerts_map_polygons_en.geojson";

        // We use a CORS proxy to bypass browser security restrictions
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(
          originalUrl
        )}`;

        try {
          const response = await fetch(proxyUrl);
          if (!response.ok)
            throw new Error("Erreur réseau lors de la connexion au proxy");

          const dataWrapper = await response.json();

          // allorigins returns the actual content in a 'contents' string
          if (!dataWrapper.contents)
            throw new Error("Le proxy n'a retourné aucune donnée");

          const data = JSON.parse(dataWrapper.contents);

          loader.style.display = "none";
          listContainer.innerHTML = "";

          let activeCount = 0;

          // Clear existing layers
          map.eachLayer((layer) => {
            if (!!layer.toGeoJSON && !layer._url) {
              map.removeLayer(layer);
            }
          });

          if (!data.features || data.features.length === 0) {
            statusLabel.innerText = "Aucune alerte active";
            return;
          }

          L.geoJSON(data, {
            style: (feature) => {
              return {
                fillColor: getColor(feature.properties),
                weight: 1,
                color: "#fff",
                fillOpacity: 0.6,
              };
            },
            onEachFeature: (feature, layer) => {
              const props = feature.properties;

              // Skip if no geometry
              if (!feature.geometry) return;

              activeCount++;

              // Popup Content
              const title = props.event || "Alerte Météo";
              const desc = props.description || "Pas de description.";
              const instruction = props.instruction
                ? `<br><br><b>Consignes:</b> ${props.instruction}`
                : "";

              layer.bindPopup(`
                <div style="min-width: 200px">
                  <strong style="color:${getColor(
                    props
                  )}; font-size:1.1em">${title}</strong><br>
                  <span style="font-size:0.9em; color:#555">${
                    props.areaDesc || ""
                  }</span>
                  <hr style="border:0; border-top:1px solid #eee; margin: 8px 0;">
                  <div style="font-size:0.85em; max-height: 150px; overflow-y:auto;">${desc}</div>
                  ${instruction}
                </div>
              `);

              // Sidebar Card
              const card = document.createElement("div");
              card.className = "alert-card";
              card.style.borderLeftColor = getColor(props);

              const shortDesc = props.description
                ? props.description.substring(0, 60) + "..."
                : "";

              card.innerHTML = `
                <div>
                  <strong>${title}</strong>
                  <small>${props.areaDesc || "Canada"}<br>${shortDesc}</small>
                </div>
              `;

              card.onclick = () => {
                if (layer.getBounds && layer.getBounds().isValid()) {
                  map.flyToBounds(layer.getBounds(), { padding: [50, 50] });
                } else if (layer.getLatLng) {
                  map.flyTo(layer.getLatLng(), 8);
                }
                layer.openPopup();
              };

              listContainer.appendChild(card);
            },
          }).addTo(map);

          statusLabel.innerText = `${activeCount} bulletins actifs`;
        } catch (error) {
          console.error("Erreur détaillée:", error);
          loader.innerHTML = `<span style="color:red">Erreur : ${error.message}</span>`;
          statusLabel.innerText = "Échec du chargement";
        }
      }

      // Run
      loadData();
    </script>
  </body>
</html>
